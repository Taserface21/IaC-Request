<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IaC Resource Request</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: #1a1d27;
            border: 1px solid #2e3148;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .header {
            text-align: center;
            margin-bottom: 36px;
        }

        .header h1 {
            font-size: 24px;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .header p {
            color: #7a7f9a;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #7a7f9a;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .select-wrapper {
            position: relative;
        }

        .select-wrapper::after {
            content: '▾';
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #7a7f9a;
            pointer-events: none;
        }

        select {
            width: 100%;
            padding: 14px 16px;
            background: #0f1117;
            border: 1px solid #2e3148;
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 15px;
            appearance: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        select:focus {
            outline: none;
            border-color: #5c6bc0;
        }

        select:hover {
            border-color: #3d4270;
        }

        /* Resource Cards */
        .resource-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .resource-card {
            background: #0f1117;
            border: 1px solid #2e3148;
            border-radius: 10px;
            padding: 18px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .resource-card:hover {
            border-color: #5c6bc0;
            background: #13162b;
        }

        .resource-card.selected {
            border-color: #5c6bc0;
            background: #1a1f3a;
            box-shadow: 0 0 0 1px #5c6bc0;
        }

        .resource-card .icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .resource-card .name {
            font-size: 13px;
            color: #c0c4d8;
            font-weight: 500;
        }

        /* Details Section */
        .details-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .details-section.visible {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .divider {
            border: none;
            border-top: 1px solid #2e3148;
            margin: 24px 0;
        }

        .details-title {
            font-size: 14px;
            color: #5c6bc0;
            margin-bottom: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            background: #0f1117;
            border: 1px solid #2e3148;
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #5c6bc0;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: #5c6bc0;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 24px;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #4a58a8;
        }

        .badge {
            display: inline-block;
            background: #1a1f3a;
            color: #5c6bc0;
            border: 1px solid #5c6bc0;
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 12px;
            margin-left: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🛠️ IaC Resource Request</h1>
        <p>Wähle eine Ressource aus und konfiguriere sie</p>
    </div>

    <!-- Resource Auswahl -->
    <label>Ressource auswählen</label>
    <div class="resource-grid">
        <div class="resource-card" onclick="selectResource('vsi')">
            <div class="icon">🖥️</div>
            <div class="name">VSI</div>
        </div>
        <div class="resource-card" onclick="selectResource('openshift')">
            <div class="icon">☸️</div>
            <div class="name">OpenShift Namespace</div>
        </div>
        <div class="resource-card" onclick="selectResource('cos')">
            <div class="icon">🪣</div>
            <div class="name">Cloud Object Storage</div>
        </div>
        <div class="resource-card" onclick="selectResource('vip')">
            <div class="icon">🌐</div>
            <div class="name">VIP</div>
        </div>
        <div class="resource-card" onclick="selectResource('database')" style="grid-column: span 2;">
            <div class="icon">🗄️</div>
            <div class="name">Datenbank</div>
        </div>
    </div>

    <!-- Details je nach Auswahl -->

    <!-- VSI -->
    <div class="details-section" id="details-vsi">
        <hr class="divider">
        <div class="details-title">⚙️ VSI Konfiguration</div>
        <div class="form-group">
            <label>Name</label>
            <input type="text" placeholder="z.B. my-server-01">
        </div>
        <div class="input-row">
            <div class="form-group">
                <label>CPU (Cores)</label>
                <input type="number" placeholder="4" min="1">
            </div>
            <div class="form-group">
                <label>RAM (GB)</label>
                <input type="number" placeholder="16" min="1">
            </div>
        </div>
    </div>

    <!-- OpenShift -->
    <div class="details-section" id="details-openshift">
        <hr class="divider">
        <div class="details-title">☸️ OpenShift Namespace Konfiguration</div>
        <div class="form-group">
            <label>Namespace Name</label>
            <input type="text" placeholder="z.B. team-backend-prod">
        </div>
        <div class="input-row">
            <div class="form-group">
                <label>CPU Limit</label>
                <input type="text" placeholder='z.B. "4" oder "500m"'>
            </div>
            <div class="form-group">
                <label>Memory Limit</label>
                <input type="text" placeholder="z.B. 8Gi">
            </div>
        </div>
    </div>

    <!-- COS -->
    <div class="details-section" id="details-cos">
        <hr class="divider">
        <div class="details-title">🪣 Cloud Object Storage Konfiguration</div>
        <div class="form-group">
            <label>Bucket Name</label>
            <input type="text" placeholder="z.B. my-bucket-prod">
        </div>
        <div class="form-group">
            <label>Storage Klasse</label>
            <div class="select-wrapper">
                <select>
                    <option value="">-- Bitte wählen --</option>
                    <option>Standard</option>
                    <option>Vault</option>
                    <option>Cold Vault</option>
                    <option>Smart Tier</option>
                </select>
            </div>
        </div>
    </div>

    <!-- VIP -->
    <div class="details-section" id="details-vip">
        <hr class="divider">
        <div class="details-title">🌐 VIP Konfiguration</div>
        <div class="form-group">
            <label>VIP Name</label>
            <input type="text" placeholder="z.B. vip-frontend">
        </div>
        <div class="form-group">
            <label>Subnetz / Zone</label>
            <input type="text" placeholder="z.B. eu-de-1">
        </div>
    </div>

    <!-- Datenbank -->
    <div class="details-section" id="details-database">
        <hr class="divider">
        <div class="details-title">🗄️ Datenbank Konfiguration</div>
        <div class="form-group">
            <label>Datenbankname</label>
            <input type="text" placeholder="z.B. prod-db-01">
        </div>
        <div class="form-group">
            <label>Typ</label>
            <div class="select-wrapper">
                <select>
                    <option value="">-- Bitte wählen --</option>
                    <option>PostgreSQL</option>
                    <option>MySQL</option>
                    <option>MongoDB</option>
                    <option>Redis</option>
                </select>
            </div>
        </div>
        <div class="input-row">
            <div class="form-group">
                <label>Storage (GB)</label>
                <input type="number" placeholder="100" min="10">
            </div>
            <div class="form-group">
                <label>RAM (GB)</label>
                <input type="number" placeholder="8" min="1">
            </div>
        </div>
    </div>

    <!-- Submit -->
    <div id="submit-section" style="display:none;">
        <button class="btn" onclick="submitRequest()">✅ Anfrage absenden</button>
    </div>

</div>

<script>
    let selectedResource = null;

    function selectResource(type) {
        // Karten highlighten
        document.querySelectorAll('.resource-card').forEach(card => {
            card.classList.remove('selected');
        });
        event.currentTarget.classList.add('selected');

        // Alle Details verstecken
        document.querySelectorAll('.details-section').forEach(section => {
            section.classList.remove('visible');
        });

        // Passendes Detail anzeigen
        const detail = document.getElementById('details-' + type);
        if (detail) {
            detail.classList.add('visible');
        }

        // Submit Button zeigen
        document.getElementById('submit-section').style.display = 'block';

        selectedResource = type;
    }

    function submitRequest() {
        alert(`Anfrage für "${selectedResource}" wird verarbeitet... \n\n(Output kommt im nächsten Schritt)`);
    }
</script>

</body>
</html>
